<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的游戏平台</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* 游戏显示区域（包含 iframe 和全屏悬浮按钮） */
        #game-wrapper {
            position: relative;
            width: 100%;
            height: 65vh;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* 悬浮在游戏右上角或右下角的全屏按钮 */
        #fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 12px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            z-index: 10;
        }
        #fullscreen-btn:active {
            background-color: rgba(255, 255, 255, 0.3);
        }
        /* 下方操作说明区 */
        .desc {
            padding: 15px;
            flex: 1;
            background: #222;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .desc h3 {
            margin: 0 0 8px 0;
            color: #4CAF50;
            font-size: 1rem;
        }
        .desc p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #ccc;
        }
    </style>
</head>
<body>

<!-- 游戏容器 -->
<div id="game-wrapper">
    <!-- 必须加上 allowfullscreen 属性以允许全屏 -->
    <iframe id="game-frame" src="game-build/web.html" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>

    <!-- 全屏切换按钮 -->
    <button id="fullscreen-btn">全画面 ⛶</button>
</div>

<!-- 下方操作说明 -->
<div class="desc">
    <h3>遊び方 / 操作说明</h3>
    <p>移動: 画面タッチ / 方向キー<br>決定・アクション: タップ / Z キー</p>
</div>

<script>
    const btn = document.getElementById('fullscreen-btn');
    const wrapper = document.getElementById('game-wrapper');

    btn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            // 进入全屏（让整个游戏容器放大到全屏，下方的说明文字会暂时隐藏或被覆盖，视具体排版而定）
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            }
            // 如果是移动端且支持横屏锁定，顺便请求横屏
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
            btn.textContent = '終了 ↩';
        } else {
            // 退出全屏
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
            btn.textContent = '全画面 ⛶';
        }
    });
</script>
</body>
</html>
