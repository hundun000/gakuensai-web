<!DOCTYPE html>
<html>
    <head>
        <title>godot-gakuensai</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background-color: #333;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #canvas {
                display: block;
                max-width: 100vw;
                max-height: 100vh;
            }
            /* 引导用户点击以触发全屏横屏的遮罩层 */
            #start-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0.85);
                color: white;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                font-family: sans-serif;
                cursor: pointer;
                text-align: center;
                padding: 20px;
            }
            #start-btn {
                background-color: #4CAF50;
                color: white;
                border: none;
                padding: 12px 24px;
                font-size: 1.2rem;
                border-radius: 8px;
                margin-top: 15px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <!-- 手机端必须通过用户点击来突破浏览器限制 -->
        <div id="start-overlay">
            <div>横画面ゲームです。ボタンを押して快適にプレイしてください</div>
            <button id="start-btn">start</button>
        </div>

        <canvas id="canvas"></canvas>
        <script src="web.js"></script>
        <script>
            const engine = new Engine({"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"web","experimentalVK":false,"fileSizes":{"web.pck":6284328,"web.wasm":37896978},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4});

            document.getElementById('start-overlay').addEventListener('click', () => {
                // 1. 请求浏览器全屏
                const docElem = document.documentElement;
                if (docElem.requestFullscreen) {
                    docElem.requestFullscreen().catch(() => {});
                } else if (docElem.webkitRequestFullscreen) {
                    docElem.webkitRequestFullscreen();
                }

                // 2. 请求锁定横屏
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }

                // 3. 隐藏引导遮罩
                document.getElementById('start-overlay').style.display = 'none';
            });

            engine.startGame();
        </script>
    </body>
</html>
